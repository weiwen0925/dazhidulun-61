<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
  --shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:17px;line-height:1.8;
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none;}

/* === Sidebar === */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding-top:8px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;width:64px;border-radius:8px;
  color:var(--sbText);text-decoration:none;
  font-family:"Noto Sans TC",sans-serif;
  transition:background .25s,color .25s,box-shadow .3s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.12);color:var(--goldL);}
.sb-item.active{background:rgba(184,134,11,.22);color:#fff;
  box-shadow:0 0 14px rgba(184,134,11,.45);}
.sb-circle{display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;background:rgba(184,134,11,.22);
  color:var(--goldL);font-size:14px;font-weight:700;letter-spacing:1px;}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;}
.sb-label{font-size:10.5px;letter-spacing:1.5px;opacity:.85;line-height:1.2;text-align:center;}

#sbToggle{display:none;}
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;position:fixed;top:14px;left:14px;
    width:42px;height:42px;border-radius:50%;background:var(--sbBg);
    color:var(--gold);border:none;align-items:center;justify-content:center;
    font-size:20px;z-index:101;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);}
}

/* === Main === */
.main{margin-left:var(--sbW);padding:0 28px;}
@media(max-width:900px){.main{margin-left:0;padding:0 16px;}}

/* === Hero === */
.site-hero{background:linear-gradient(135deg,#1e1a14 0%,#3d3225 50%,#1e1a14 100%);
  color:#fff;padding:90px 24px 84px;text-align:center;
  border-radius:0 0 22px 22px;margin-bottom:34px;position:relative;overflow:hidden;}
.site-hero::before{
  content:"般若";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:340px;font-weight:900;letter-spacing:42px;
  color:rgba(212,168,75,.04);pointer-events:none;font-family:"Noto Serif TC",serif;}
.hero-latin{font-family:"Noto Sans TC",sans-serif;
  font-size:12px;letter-spacing:5px;color:var(--goldL);
  opacity:.85;margin-bottom:18px;position:relative;}
.hero-title{font-size:46px;font-weight:900;color:var(--goldL);
  letter-spacing:14px;margin:6px 0 14px;position:relative;}
.hero-volume{font-family:"Noto Sans TC",sans-serif;
  font-size:18px;letter-spacing:14px;color:#e8d8b0;margin-bottom:18px;position:relative;}
.hero-name{font-size:30px;letter-spacing:10px;color:#fff;
  margin:6px 0 22px;position:relative;}
.hero-author{font-size:14px;letter-spacing:4px;color:#c5b48a;
  margin:0 0 14px;position:relative;font-family:"Noto Sans TC",sans-serif;}
.hero-range{display:inline-block;border-top:1px solid rgba(212,168,75,.4);
  border-bottom:1px solid rgba(212,168,75,.4);padding:8px 28px;
  font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:4px;color:var(--goldL);position:relative;margin-top:6px;}

/* === Preface === */
.preface{max-width:920px;margin:30px auto 40px;padding:30px 36px;
  background:var(--card);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:14px;
  box-shadow:0 2px 14px rgba(91,58,41,.08);}
.preface h2{font-size:24px;color:var(--accent);text-align:center;
  letter-spacing:8px;margin:0 0 18px;padding:0;font-weight:700;border:none;background:none;}
.preface p{margin:0 0 14px;color:var(--text2);line-height:2;font-size:16.5px;}
.preface p:last-child{margin-bottom:0;}

/* === TOC === */
.toc-section{max-width:1100px;margin:50px auto 42px;padding:36px 28px;
  background:var(--card);border:1px solid var(--border);border-radius:18px;
  box-shadow:0 2px 14px rgba(91,58,41,.08);}
.toc-title{font-size:28px;color:var(--accent);text-align:center;
  letter-spacing:12px;margin:0 0 8px;font-weight:700;}
.toc-desc{font-size:14px;color:var(--text-muted);text-align:center;
  letter-spacing:3px;margin:0 0 28px;font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
.toc-card{display:flex;gap:14px;padding:18px 20px;background:#fffaf0;
  border:1px solid var(--border);border-radius:12px;
  text-decoration:none;color:var(--text);
  transition:transform .3s,box-shadow .3s,border-color .3s;cursor:pointer;}
.toc-card:hover{transform:translateY(-3px);
  box-shadow:0 8px 22px rgba(184,134,11,.18);
  border-color:var(--gold);}
.toc-num{flex-shrink:0;width:38px;height:38px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:700;
  letter-spacing:1px;font-family:"Noto Sans TC",sans-serif;}
.toc-body{flex:1;}
.toc-name{font-size:17px;font-weight:700;color:var(--accent);
  line-height:1.55;margin-bottom:6px;}
.toc-sub{font-size:13px;color:var(--text-muted);letter-spacing:1px;line-height:1.7;}

/* === Chapter === */
section.chapter{margin:60px 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;
  padding:42px 28px;border-radius:16px 16px 0 0;text-align:center;
  position:relative;overflow:hidden;}
.ch-head::after{content:"";position:absolute;left:50%;bottom:0;
  transform:translateX(-50%);width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:15px;
  letter-spacing:6px;color:var(--goldL);margin-bottom:10px;opacity:.95;}
.ch-name{font-size:30px;font-weight:700;letter-spacing:6px;
  color:#fff;margin:6px 0;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:3px;color:#e8d8b0;margin-top:10px;line-height:1.8;}
.ch-body{background:var(--card);max-width:1100px;margin:0 auto;
  padding:34px 26px;border:1px solid var(--border);border-top:0;
  border-radius:0 0 16px 16px;}

/* === Bridge === */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* === iframe === */
.ch-frame{display:block;width:100%;border:0;
  background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

/* === Next link === */
.next-link{display:inline-block;margin:18px auto 0;padding:10px 22px;
  background:var(--accent);color:#fff;text-decoration:none;
  border-radius:24px;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:3px;transition:background .25s,box-shadow .3s;}
.next-link:hover{background:var(--gold);box-shadow:0 4px 14px rgba(184,134,11,.4);}
.next-link-wrap{text-align:center;margin-top:14px;}

/* === Read progress 膠囊 === */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* === Back-to-top === */
#backTop{position:fixed;right:28px;bottom:24px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;border:none;
  font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;
  z-index:110;box-shadow:0 3px 12px rgba(0,0,0,.25);transition:background .25s;}
#backTop:hover{background:var(--gold);}
#backTop.show{display:flex;}

/* === Footer === */
.site-footer{margin:60px 0 110px;padding:28px 22px;background:transparent;
  text-align:center;color:var(--text2);}
.site-footer .verse{display:inline-block;padding:24px 32px;
  background:var(--verseBg);border-top:2px solid var(--gold);
  border-bottom:2px solid var(--gold);border-radius:8px;
  letter-spacing:4px;line-height:2.2;color:var(--accent);
  font-size:16px;font-style:normal;}
.site-footer p{margin:0;}

@media(max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:34px;letter-spacing:8px;}
  .hero-name{font-size:22px;letter-spacing:6px;}
  .ch-name{font-size:23px;letter-spacing:4px;}
  .toc-grid{grid-template-columns:1fr;}
}

/* ============ 1.2x 字級放大（新卷預設）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-volume{font-size:22px!important;}

.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}

.toc-num{font-size:17px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub{font-size:17px!important;}

.read-progress .rp-pct{font-size:13px!important;}

.sb-label{font-size:11.5px!important;}
.site-footer .verse{font-size:18px!important;letter-spacing:5px!important;}

<script>
(function(){
  // === Sidebar toggle (mobile) ===
  var sb = document.getElementById('sb');
  var tog = document.getElementById('sbToggle');
  if(tog){tog.addEventListener('click', function(){sb.classList.toggle('open');});}

  // === Sidebar brand → back top ===
  var brand = document.getElementById('sbBrand');
  if(brand){brand.addEventListener('click', function(e){
    e.preventDefault();
    window.scrollTo({top:0, behavior:'smooth'});
  });}

  // === Back to top ===
  var bt = document.getElementById('backTop');
  window.addEventListener('scroll', function(){
    if(window.scrollY > 600){bt.classList.add('show');} else {bt.classList.remove('show');}
  }, {passive:true});
  if(bt){bt.addEventListener('click', function(){window.scrollTo({top:0, behavior:'smooth'});});}

  // === Read progress ===
  var rpFill = document.getElementById('rpFill');
  var rpPct  = document.getElementById('rpPct');
  function updateProgress(){
    var sh = document.documentElement.scrollHeight - window.innerHeight;
    var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
    if(rpFill) rpFill.style.width = pct + '%';
    if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
  }
  window.addEventListener('scroll', updateProgress, {passive:true});
  updateProgress();
  window.__updateProgress = updateProgress;

  // === Near-end fade out ===
  (function(){
    var cap = document.getElementById('readProgress');
    if(!cap) return;
    function setHide(on){cap.classList.toggle('hide-near-end', !!on);}
    var targets = [];
    var f1 = document.querySelector('[data-wy-notice="v2"]');
    if(f1) targets.push(f1);
    var f2 = document.querySelector('.site-footer');
    if(f2) targets.push(f2);
    if(!targets.length) return;
    if('IntersectionObserver' in window){
      var io = new IntersectionObserver(function(entries){
        var any = entries.some(function(e){return e.isIntersecting;});
        setHide(any);
      }, {root:null, rootMargin:'0px 0px -20px 0px', threshold:0.01});
      targets.forEach(function(t){io.observe(t);});
    } else {
      var check=function(){
        var dh=document.documentElement.scrollHeight;
        var sb=window.scrollY+window.innerHeight;
        setHide(dh - sb < 240);
      };
      window.addEventListener('scroll', check, {passive:true});
      check();
    }
  })();

  // === Sidebar active highlight ===
  var sbItems = Array.from(document.querySelectorAll('.sb-item'));
  var chapters = Array.from(document.querySelectorAll('section.chapter'));
  function syncActive(){
    var winH = window.innerHeight;
    var cur = null;
    for(var i=0; i<chapters.length; i++){
      var r = chapters[i].getBoundingClientRect();
      if(r.top < winH * 0.35) cur = chapters[i];
      else break;
    }
    var idx = cur ? chapters.indexOf(cur) : -1;
    sbItems.forEach(function(el, i){el.classList.toggle('active', i === idx);});
  }
  window.addEventListener('scroll', syncActive, {passive:true});
  syncActive();

  // === iframe auto-resize ===
  function resizeFrame(f){
    try{
      var d = f.contentDocument || f.contentWindow.document;
      if(!d || !d.body) return;
      d.body.style.minHeight = '0';
      d.body.style.height = 'auto';
      if(d.documentElement){
        d.documentElement.style.minHeight = '0';
        d.documentElement.style.height = 'auto';
      }
      var h = d.body.scrollHeight;
      if(h > 100){
        f.style.height = h + 'px';
        f.style.minHeight = '0';
      }
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    if(typeof updateProgress === 'function') updateProgress();
  }
  function setupFrame(f){
    var tries = 0;
    function tick(){
      tries++;
      resizeFrame(f);
      if(tries < 30) setTimeout(tick, 200);
    }
    if(f.contentDocument && f.contentDocument.readyState === 'complete'){
      tick();
    } else {
      f.addEventListener('load', tick);
    }
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);

  var rzT;
  window.addEventListener('resize', function(){
    clearTimeout(rzT);
    rzT = setTimeout(resizeAllFrames, 200);
  });

  // === Anchor smooth scroll (with iframe-resize tolerance) ===
  document.addEventListener('click', function(e){
    var a = e.target;
    while(a && a.tagName !== 'A') a = a.parentElement;
    if(!a) return;
    var h = a.getAttribute('href');
    if(!h || h.charAt(0) !== '#' || h.length < 2) return;
    var id = h.substring(1);
    var el = document.getElementById(id);
    if(!el) return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect = el.getBoundingClientRect();
      var y = window.scrollY + rect.top - 20;
      window.scrollTo({top:y, behavior:'smooth'});
    }, 60);
  }, true);

  // === 15s polling ===
  var _rt = 0, _riv = setInterval(function(){
    _rt++;
    resizeAllFrames();
    if(_rt > 50) clearInterval(_riv);
  }, 300);

  // === Anti-copy (outer) ===
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){e.preventDefault();return false;}, true);
  });
  document.addEventListener('keydown', function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){e.preventDefault();return false;}
    if(k==='F12'){e.preventDefault();return false;}
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){e.preventDefault();return false;}
  }, true);
})();
</script>

      e.preventDefault(); e.stopPropagation();
      return false;

  var KEY = "wy-dazhidulun-61-v1";

      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
